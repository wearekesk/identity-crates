name: Release

# On-demand publishing to crates.io. Bump the crate version(s) in Cargo.toml
# first, then run this workflow from the Actions tab. Defaults to a dry run so
# you can validate packaging before actually uploading.
#
# Authentication uses crates.io Trusted Publishing (OIDC): a short-lived token
# is minted per run, so there is no long-lived CARGO_REGISTRY_TOKEN secret to
# store or leak. Before the first real publish, configure a Trusted Publisher
# for each crate on crates.io (Owner: this repo, Workflow: release.yml).
on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - dmrtd
          - mrz-parser
          - aamva
          - aadhaar-offline-kyc
          - incometax-pan-qr
      dry_run:
        description: "Dry run (package + verify only, no upload)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish (${{ inputs.crate }}${{ inputs.dry_run && ' — dry run' || '' }})
    # Only ever publish from the repository's default branch, so a manual
    # dispatch from an arbitrary branch cannot upload to crates.io. Uses the
    # default-branch context so it keeps working if the branch is renamed.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the crates.io OIDC token
    steps:
      # Third-party actions pinned to immutable commit SHAs (version in comment).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      # Mint a short-lived crates.io token via OIDC — only for a real publish.
      # On a dry run this is skipped and no token is requested.
      - name: Authenticate to crates.io (OIDC)
        id: auth
        if: ${{ !inputs.dry_run }}
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish to crates.io
        env:
          # Empty on a dry run (the auth step is skipped); dry-run packaging and
          # verification never need a token.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          CRATE: ${{ inputs.crate }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          flags="--locked"
          if [ "${DRY_RUN}" = "true" ]; then
            flags="${flags} --dry-run"
          fi
          publish_one() {
            echo "::group::cargo publish -p $1 ${flags}"
            cargo publish -p "$1" ${flags}
            echo "::endgroup::"
          }
          # The member crates are independent (no inter-crate path deps), so the
          # order below is not significant.
          if [ "${CRATE}" = "all" ]; then
            for c in mrz-parser aamva aadhaar-offline-kyc incometax-pan-qr dmrtd; do
              publish_one "$c"
            done
          else
            publish_one "${CRATE}"
          fi
