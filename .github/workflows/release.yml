name: Release

# On-demand publishing to crates.io. Bump the crate version(s) in Cargo.toml
# first, then run this workflow from the Actions tab. Defaults to a dry run so
# you can validate packaging before actually uploading.
on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - dmrtd
          - mrz-parser
          - aamva
          - aadhaar-offline-kyc
      dry_run:
        description: "Dry run (package + verify only, no upload)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: publish (${{ inputs.crate }}${{ inputs.dry_run && ' — dry run' || '' }})
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to immutable commit SHAs (version in comment).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE: ${{ inputs.crate }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          flags="--locked"
          if [ "${DRY_RUN}" = "true" ]; then
            flags="${flags} --dry-run"
          fi
          publish_one() {
            echo "::group::cargo publish -p $1 ${flags}"
            cargo publish -p "$1" ${flags}
            echo "::endgroup::"
          }
          # The member crates are independent (no inter-crate path deps), so the
          # order below is not significant.
          if [ "${CRATE}" = "all" ]; then
            for c in mrz-parser aamva aadhaar-offline-kyc dmrtd; do
              publish_one "$c"
            done
          else
            publish_one "${CRATE}"
          fi
