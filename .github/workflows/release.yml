name: Release

# On-demand publishing to crates.io. Bump the crate version(s) in Cargo.toml
# first, then run this workflow from the Actions tab. Defaults to a dry run so
# you can validate packaging before actually uploading.
#
# Authentication uses crates.io Trusted Publishing (OIDC): a short-lived token
# is minted per run, so there is no long-lived CARGO_REGISTRY_TOKEN secret to
# store or leak. Before the first real publish, configure a Trusted Publisher
# for each crate on crates.io (Owner: this repo, Workflow: release.yml).
on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - dmrtd
          - mrz-parser
          - aamva
          - aadhaar-offline-kyc
          - incometax-pan-qr
      dry_run:
        description: "Dry run (package + verify only, no upload)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Dry run: packages and verifies the selected crate(s) without uploading. This
  # job deliberately holds NO id-token permission — it never authenticates to
  # crates.io, so an OIDC token must not be mintable on this path.
  dry-run:
    name: dry-run (${{ inputs.crate }})
    # Only ever run from the repository's default branch, so a manual dispatch
    # from an arbitrary branch cannot reach crates.io. Uses the default-branch
    # context so it keeps working if the branch is renamed.
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Third-party actions pinned to immutable commit SHAs (version in comment).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Dry-run publish to crates.io
        env:
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          # Expands the crate selection: "all" -> every member crate, otherwise
          # just the chosen one. The member crates are independent (no inter-crate
          # path deps), so the order is not significant.
          selected_crates() {
            if [ "${CRATE}" = "all" ]; then
              echo "mrz-parser aamva aadhaar-offline-kyc incometax-pan-qr dmrtd"
            else
              echo "${CRATE}"
            fi
          }
          for c in $(selected_crates); do
            echo "::group::cargo publish -p ${c} --locked --dry-run"
            cargo publish -p "${c}" --locked --dry-run
            echo "::endgroup::"
          done

  # Real publish: uploads the selected crate(s) to crates.io. Only this job holds
  # id-token: write, so the short-lived OIDC token can only be minted on the real
  # publish path.
  publish:
    name: publish (${{ inputs.crate }})
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required to mint the crates.io OIDC token
    steps:
      # Third-party actions pinned to immutable commit SHAs (version in comment).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      # Mint a short-lived crates.io token via OIDC for the real publish.
      - name: Authenticate to crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          CRATE: ${{ inputs.crate }}
        run: |
          set -euo pipefail
          # Expands the crate selection: "all" -> every member crate, otherwise
          # just the chosen one. The member crates are independent (no inter-crate
          # path deps), so the order is not significant.
          selected_crates() {
            if [ "${CRATE}" = "all" ]; then
              echo "mrz-parser aamva aadhaar-offline-kyc incometax-pan-qr dmrtd"
            else
              echo "${CRATE}"
            fi
          }
          for c in $(selected_crates); do
            echo "::group::cargo publish -p ${c} --locked"
            cargo publish -p "${c}" --locked
            echo "::endgroup::"
          done
